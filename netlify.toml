[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

  [functions."vton-generate"]
    timeout = 60

  [functions."resize-image"]
    timeout = 60

[dev]
  command = "npm run dev:vite"
  targetPort = 3000
  port = 8888
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
